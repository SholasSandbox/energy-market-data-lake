name: Deploy AWS Demo

on:
  workflow_dispatch:
    inputs:
      backfill_days:
        description: Backfill window for this deployment run
        required: true
        default: "1"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: aws-demo
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-2' }}

      - name: Run demo deployment
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-2' }}
          BACKFILL_DAYS: ${{ inputs.backfill_days }}
        run: ./scripts/closeout_demo.sh

      - name: Upload demo evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-evidence
          path: docs/evidence/
