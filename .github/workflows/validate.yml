name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-and-shell:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python sources
        run: python -m compileall lambda glue scripts

      - name: Validate bash script syntax
        run: bash -n scripts/closeout_demo.sh

  dashboard-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard-ui
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard-ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build
